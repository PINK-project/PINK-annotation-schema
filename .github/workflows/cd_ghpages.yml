name: Deploy on GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-on-ghpages:
    #concurrency: ci-${{ github.ref }}  # Recommended if you intend to make multiple deployments in quick succession.
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.13

    - name: Install EMMOntoPy and tripper
      run: |
        pip install --upgrade pip
        pip install \
            "EMMOntoPy[ontodoc,ontokit] @ git+https://github.com/emmo-repo/EMMOntoPy.git@ontokit_dev" \
            "tripper[datadoc] @ git+https://github.com/EMMC-ASBL/tripper.git@master"

    - name: Generate documentation
      run: |
        mkdir -p public
        cp README.md public/index.md
        cp _config.yml public/_config.yml


    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: public
        branch: gh-pages
        clean: true
        single-commit: true
